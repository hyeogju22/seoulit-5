<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMTI — 20정밀 네온 성향 테스트</title>
  <!-- 로컬 실행 호환성을 위해 쿼리스트링(?v=3)을 완전히 제거했습니다 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <!-- 1. 시작 화면 -->
    <section id="start-page" class="page active">
      <div class="badge">🛸 CYBER NEON BMTI v3.0</div>
      <h1>My Real <b>BMTI</b></h1>
      <p>중복 없는 완전히 새로운 20개의 쿼리.<br>당신의 무의식 속에 숨겨진 진짜 성향을 추적합니다.</p>
      <div class="hero-img">✨</div>
      <button id="btn-start" class="btn-main">엔터 코어 시작하기</button>
    </section>

    <!-- 2. 질문 화면 -->
    <section id="question-page" class="page">
      <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
      </div>
      <div class="count" id="question-count">1 / 20</div>
      <h2 id="question-text">데이터 동기화 중...</h2>
      
      <div class="options">
        <button class="btn-option" id="answer-a">선택지 A</button>
        <button class="btn-option" id="answer-b">선택지 B</button>
      </div>
    </section>

    <!-- 3. 결과 화면 -->
    <section id="result-page" class="page">
      <div class="badge result-badge">🔮 분석 완료</div>
      <p class="result-kicker">디코딩된 소울 코드</p>
      <h1 id="result-title">ESTJ</h1>
      <p id="result-desc">결과 데이터를 매핑하는 중입니다.</p>
      
      <div class="action-box">
        <button id="btn-restart" class="btn-main sub">시스템 리부트 (다시하기)</button>
      </div>
    </section>
  </div>

  <!-- 스크립트 쪽도 쿼리스트링을 제거했습니다 -->
  <script src="script.js"></script>
</body>
</html>
